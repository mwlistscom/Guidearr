# Guidearr — bundled web server (nginx) vhost.
# Mounted read-only at /etc/nginx/conf.d/default.conf by docker-compose.
# Edit this file on the host, then: docker compose exec web nginx -t && nginx -s reload
server {
    # Direct access: terminate TLS here.
    listen 7979 ssl;
    http2 on;
    # Behind a reverse proxy that terminates TLS (HAProxy/Traefik/Caddy/nginx):
    # plain HTTP for the proxy only — keep this port off the public internet.
    listen 8080;
    server_name _;

    ssl_certificate     /etc/ssl/tunarr/fullchain.pem;
    ssl_certificate_key /etc/ssl/tunarr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /var/www/html/public;
    index index.php;
    client_max_body_size 20m;

    # --- Real client IP behind a reverse proxy --------------------------------
    # When Guidearr runs behind a proxy (the common case), the address nginx sees
    # is the proxy's, not the visitor's. These lines trust private-network proxies
    # and promote the real client IP from X-Forwarded-For, so the logs below and
    # the app's per-IP logic see the actual visitor. If your proxy sits on a PUBLIC
    # address, add a line for it, e.g.  set_real_ip_from 203.0.113.10;
    # Accessing Guidearr directly (no proxy) leaves these inert — nothing to do.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # --- Logs -----------------------------------------------------------------
    # Logged to the container's stdout/stderr (docker compose logs web) AND into
    # the app's storage/logs, so they appear in Admin > Logs (tail viewer) and in
    # the downloadable log bundle as nginx-access.log / nginx-error.log.
    access_log /dev/stdout main;
    access_log /var/www/html/storage/logs/nginx-access.log main;
    error_log  /dev/stderr  warn;
    error_log  /var/www/html/storage/logs/nginx-error.log warn;

    # --- Security headers (sent on every response) ----------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Cache-Control          "no-transform"                    always;

    server_tokens off;
    server_name_in_redirect off;
    ignore_invalid_headers on;

    # accidental http:// on the TLS port -> bounce to https
    error_page 497 =301 https://$host:7979$request_uri;

    # --- WAF: query-string injection / known exploits -------------------------
    set $block 0;
    if ($query_string ~ "[a-zA-Z0-9_]=http://")           { set $block 1; }
    if ($query_string ~ "[a-zA-Z0-9_]=(\.\.//?)+")        { set $block 1; }
    if ($query_string ~ "[a-zA-Z0-9_]=/([a-z0-9_.]//?)+") { set $block 1; }
    if ($query_string ~ "\=PHP[a-f0-9\-]{36}")            { set $block 1; }
    if ($query_string ~ "proc/self/environ")              { set $block 1; }
    if ($query_string ~ "base64_(en|de)code")             { set $block 1; }
    if ($query_string ~ "(<|%3C).*script.*(>|%3E)")       { set $block 1; }
    if ($query_string ~ "GLOBALS")                        { set $block 1; }
    if ($query_string ~ "_REQUEST")                       { set $block 1; }
    if ($block = 1) { return 403; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Scheme/port come from fastcgi_params (REQUEST_SCHEME/$server_port); a TLS-
        # terminating proxy forwards X-Forwarded-Proto/Host/Port and Laravel's
        # TrustProxies uses those, so URLs are correct direct or behind the proxy.
        fastcgi_param HTTPS $https if_not_empty;

        # Bigger buffers so large responses (branding images) aren't spooled to a
        # temp file — silences the "buffered to a temporary file" warnings.
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
    }

    # Deny dotfiles (.env, .git, …) except ACME well-known.
    location ~ /\.(?!well-known).* { deny all; }
}
