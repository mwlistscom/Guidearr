server {
    # Direct access: terminate TLS here.
    listen 7979 ssl;
    http2 on;
    # Behind a reverse proxy that terminates TLS (HAProxy/Traefik/Caddy/nginx): point it here.
    # Plain HTTP — keep this port reachable only by the proxy (see docker-compose).
    listen 8080;
    server_name _;

    ssl_certificate     /etc/ssl/tunarr/fullchain.pem;
    ssl_certificate_key /etc/ssl/tunarr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /var/www/html/public;
    index index.php;
    client_max_body_size 20m;

    # accidental http:// on the TLS port -> bounce to https
    error_page 497 =301 https://$host:7979$request_uri;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Scheme/port are NOT hardcoded. fastcgi_params already passes REQUEST_SCHEME=$scheme and
        # SERVER_PORT=$server_port from the real connection (https/7979 direct, http/8080 via proxy).
        # A TLS-terminating proxy forwards X-Forwarded-Proto/Host/Port; Laravel's TrustProxies then
        # uses those. Result: the app builds correct URLs whether accessed directly or behind a proxy.
        fastcgi_param HTTPS $https if_not_empty;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
